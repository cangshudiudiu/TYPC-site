backend:
  name: github
  repo: cangshudiudiu/TYPC-site
  branch: main
  base_url: https://decap-oauth.uquk202268.workers.dev
  auth_endpoint: /auth
  use_graphql: true
  open_authoring: true

local_backend: true
publish_mode: editorial_workflow
media_folder: "public/uploads"
public_folder: "/uploads"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "research"
    label: "研究"
    label_singular: "研究文章"
    folder: "src/content/research"
    create: true
    delete: false
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "research/{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "状态", name: "status", widget: "select", options: [{ label: "发布", value: "published" }, { label: "归档隐藏", value: "archived" }], default: "published" }
      - { label: "首页推荐", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "语言", name: "language", widget: "select", options: ["zh", "en"], default: "zh" }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "作者", name: "authors", widget: "list", required: false }
      - { label: "研究状态", name: "researchStatus", widget: "select", options: [{ label: "草稿", value: "draft" }, { label: "预印本", value: "preprint" }, { label: "已发表", value: "published" }], default: "preprint" }
      - { label: "发表/来源", name: "venue", widget: "string", required: false }
      - { label: "DOI", name: "doi", widget: "string", required: false }
      - { label: "代码链接", name: "codeUrl", widget: "string", required: false }
      - { label: "引用格式", name: "citation", widget: "text", required: false }
      - label: "附件"
        name: "attachments"
        widget: "list"
        required: false
        fields:
          - { label: "附件名称", name: "label", widget: "string" }
          - { label: "类型", name: "type", widget: "select", options: ["PDF", "Data", "Code", "Supplement", "File"], default: "PDF" }
          - { label: "文件或链接", name: "url", widget: "file", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "blog"
    label: "博客"
    label_singular: "博客文章"
    folder: "src/content/blog"
    create: true
    delete: false
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "blog/{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "状态", name: "status", widget: "select", options: [{ label: "发布", value: "published" }, { label: "归档隐藏", value: "archived" }], default: "published" }
      - { label: "首页推荐", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "语言", name: "language", widget: "select", options: ["zh", "en"], default: "zh" }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "essays"
    label: "随笔动态"
    label_singular: "动态"
    folder: "src/content/essays"
    create: true
    delete: false
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "essays/{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "状态", name: "status", widget: "select", options: [{ label: "发布", value: "published" }, { label: "归档隐藏", value: "archived" }], default: "published" }
      - { label: "首页推荐", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "语言", name: "language", widget: "select", options: ["zh", "en"], default: "zh" }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "resources"
    label: "资料"
    label_singular: "资料"
    folder: "src/content/resources"
    create: true
    delete: false
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "resources/{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "状态", name: "status", widget: "select", options: [{ label: "发布", value: "published" }, { label: "归档隐藏", value: "archived" }], default: "published" }
      - { label: "首页推荐", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "语言", name: "language", widget: "select", options: ["zh", "en"], default: "zh" }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "bookmarks"
    label: "收藏"
    label_singular: "收藏链接"
    folder: "src/content/bookmarks"
    create: true
    delete: false
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "状态", name: "status", widget: "select", options: [{ label: "发布", value: "published" }, { label: "归档隐藏", value: "archived" }], default: "published" }
      - { label: "首页推荐", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "语言", name: "language", widget: "select", options: ["zh", "en"], default: "zh" }
      - { label: "外部链接", name: "externalUrl", widget: "string", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "备注", name: "body", widget: "markdown", required: false }

  - name: "downloads"
    label: "下载"
    label_singular: "下载项"
    folder: "src/content/downloads"
    create: true
    delete: false
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "状态", name: "status", widget: "select", options: [{ label: "发布", value: "published" }, { label: "归档隐藏", value: "archived" }], default: "published" }
      - { label: "首页推荐", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "语言", name: "language", widget: "select", options: ["zh", "en"], default: "zh" }
      - { label: "下载文件", name: "fileUrl", widget: "file", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "说明", name: "body", widget: "markdown", required: false }
