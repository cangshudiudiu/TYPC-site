<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>藏书小刊 Admin</title>
  </head>
  <body>
    <noscript>需要启用 JavaScript 才能使用管理后台。</noscript>
    <div id="cms-note" style="font-family: system-ui, sans-serif; max-width: 720px; margin: 48px auto; padding: 0 20px; color: #1d252c;">
      <h1 style="font-size: 28px; margin: 0 0 12px;">藏书小刊 Admin</h1>
      <p style="line-height: 1.7; color: #66717c;">
        管理后台正在加载。这里仅供站长登录使用，内容会先进入 GitHub 审核流程，再发布到网站。
      </p>
    </div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      window.addEventListener("load", () => {
        document.getElementById("cms-note")?.remove();
      });
    </script>
  </body>
</html>
